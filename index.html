<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body{background:#000;color:#fff;font-family:sans-serif;padding:20px;}
input{width:100%;padding:15px;border-radius:20px;border:none;margin-bottom:20px;}
div{background:#fff;color:#000;padding:15px;margin-bottom:10px;border-radius:20px;font-weight:bold;}
.adm{display:none;background:#ff0;padding:15px;border-radius:20px;margin-bottom:20px;color:red;}
</style>
</head>
<body onload="loadData()">
<input type="text" id="s" placeholder="Поиск..." oninput="f()">
<div id="p" class="adm">
    <input type="text" id="newText" placeholder="Введите новый пункт">
    <button onclick="add()">Добавить</button>
</div>
<div id="list"></div>
<input type="password" id="pass" placeholder="Пароль админа" onchange="check()">

<script>
function f(){let v=document.getElementById('s').value.toLowerCase();document.querySelectorAll('.i').forEach(i=>i.style.display=i.innerText.toLowerCase().includes(v)?'block':'none');}
function check(){if(document.getElementById('pass').value == "Mironnmm7#"){document.getElementById('p').style.display='block';}else{alert('Неверный пароль');}}

function saveData(){localStorage.setItem('myDB', document.getElementById('list').innerHTML);}
function loadData(){if(localStorage.getItem('myDB')) document.getElementById('list').innerHTML = localStorage.getItem('myDB');}

function add(){
    let val = document.getElementById('newText').value;
    if(val){
        let d = document.createElement('div');
        d.className = 'i';
        d.innerText = val;
        document.getElementById('list').appendChild(d);
        document.getElementById('newText').value = '';
        saveData();
    }
}
</script>
</body>
</html>
