<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #1a0033; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; transition: 0.3s; }
        h1 { text-align: center; color: #bf00ff; text-shadow: 0 0 10px #bf00ff; }
        .theme-btn { 
            background: rgba(255, 255, 255, 0.1); border: 1px solid #bf00ff; 
            color: #fff; padding: 15px; margin: 10px 0; border-radius: 15px; 
            cursor: pointer; transition: 0.3s; backdrop-filter: blur(5px);
        }
        .theme-btn:hover { background: #bf00ff; transform: scale(1.02); }
        #details { display: none; background: #2a004d; padding: 25px; border-radius: 20px; border: 2px solid #bf00ff; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .admin-controls { display: none; margin-top: 30px; border: 2px dashed #bf00ff; padding: 15px; border-radius: 15px; }
        input { width: 90%; padding: 12px; margin: 5px 0; border-radius: 8px; border: none; }
        button { padding: 10px 20px; cursor: pointer; background: #bf00ff; color: white; border: none; border-radius: 8px; margin: 5px; }
    </style>
</head>
<body>

    <div id="main-screen">
        <h1>chikohelp</h1>
        <div id="list"></div>

        <div id="admin-panel" style="margin-top:40px;">
            <input type="password" id="pass" placeholder="Пароль администратора">
            <button onclick="check()">Войти</button>
        </div>

        <div id="editor" class="admin-controls">
            <h3>Энерго-редактор</h3>
            <input type="text" id="newTitle" placeholder="Заголовок (например: ПУ 007)">
            <input type="text" id="newText" placeholder="Подробная информация...">
            <button onclick="addTheme()">Добавить тему</button>
            <button onclick="deleteLast()">Удалить последнюю</button>
        </div>
    </div>

    <div id="details">
        <h2 id="detail-title" style="color:#0ff;"></h2>
        <p id="detail-text"></p>
        <button onclick="hideDetails()">Назад</button>
    </div>

    <script>
        function showDetails(title, text) {
            document.getElementById('main-screen').style.display = 'none';
            document.getElementById('details').style.display = 'block';
            document.getElementById('detail-title').innerText = title;
            document.getElementById('detail-text').innerText = text;
        }
        function hideDetails() {
            document.getElementById('main-screen').style.display = 'block';
            document.getElementById('details').style.display = 'none';
        }
        function check() {
            if(document.getElementById('pass').value === "Mironnmm7#") {
                document.getElementById('editor').style.display = 'block';
                document.getElementById('admin-panel').style.display = 'none';
            } else { alert("Неверный пароль!"); }
        }
        function addTheme() {
            let title = document.getElementById('newTitle').value;
            let text = document.getElementById('newText').value;
            if(!title) return;
            let div = document.createElement('div');
            div.className = 'theme-btn';
            div.innerText = '⚡ ' + title;
            div.onclick = function() { showDetails(title, text); };
            document.getElementById('list').appendChild(div);
            document.getElementById('newTitle').value = '';
            document.getElementById('newText').value = '';
        }
        function deleteLast() {
            let list = document.getElementById('list');
            if(list.lastElementChild) list.removeChild(list.lastElementChild);
        }
    </script>
</body>
</html>
