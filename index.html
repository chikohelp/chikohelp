<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #1a0033; color: #fff; font-family: sans-serif; padding: 20px; overflow-x: hidden; }
        h1 { text-align: center; color: #bf00ff; text-shadow: 0 0 20px #bf00ff; }
        
        /* Эффект проводов (линии) */
        .wires { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; opacity: 0.1; }
        .wire { position: absolute; background: cyan; width: 2px; height: 100px; animation: move 3s linear infinite; }
        @keyframes move { from { top: -100px; } to { top: 100%; } }

        /* Кнопки тем */
        .theme-btn { 
            background: rgba(255, 255, 255, 0.05); border: 1px solid #bf00ff; 
            color: #fff; padding: 15px; margin: 10px 0; border-radius: 15px; 
            cursor: pointer; transition: 0.3s; 
        }
        .theme-btn:hover { background: #bf00ff; transform: scale(1.02); }
        
        #details { display: none; background: #2a004d; padding: 25px; border-radius: 20px; border: 2px solid #bf00ff; }
        .admin-panel { margin-top: 40px; border: 2px dashed #bf00ff; padding: 20px; border-radius: 15px; }
        input { width: 90%; padding: 10px; margin: 5px 0; border-radius: 5px; }
        button { padding: 10px 20px; background: #bf00ff; color: white; border: none; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="wires">
        <div class="wire" style="left: 10%;"></div>
        <div class="wire" style="left: 50%; animation-delay: 1s;"></div>
        <div class="wire" style="left: 90%; animation-delay: 2s;"></div>
    </div>

    <div id="main-screen">
        <h1>chikohelp</h1>

        <div id="list">
            </div>

        <div class="admin-panel">
            <h3>Панель администратора</h3>
            <input type="password" id="pass" placeholder="Пароль">
            <button onclick="check()">Войти</button>
            <div id="editor" style="display:none; margin-top:15px;">
                <input type="text" id="t" placeholder="Заголовок">
                <input type="text" id="tx" placeholder="Текст">
                <button onclick="generate()">Сгенерировать код</button>
                <textarea id="result" style="width:90%; height:60px; margin-top:10px;"></textarea>
            </div>
        </div>
        <div class="footer" style="text-align:center; color:#888; margin-top:20px;">Создатель: Мирбек.Б</div>
    </div>

    <div id="details">
        <h2 id="detail-title" style="color:#0ff;"></h2>
        <p id="detail-text"></p>
        <button onclick="hideDetails()">Назад</button>
    </div>

    <script>
        function check() { if(document.getElementById('pass').value === "Mironnmm7#") document.getElementById('editor').style.display = 'block'; else alert("Неверный пароль"); }
        function generate() {
            let t = document.getElementById('t').value;
            let tx = document.getElementById('tx').value;
            document.getElementById('result').value = `<div class="theme-btn" onclick="showDetails('${t}', '${tx}')">⚡ ${t}</div>`;
        }
        function showDetails(t, tx) { document.getElementById('main-screen').style.display = 'none'; document.getElementById('details').style.display = 'block'; document.getElementById('detail-title').innerText = t; document.getElementById('detail-text').innerText = tx; }
        function hideDetails() { document.getElementById('main-screen').style.display = 'block'; document.getElementById('details').style.display = 'none'; }
    </script>
</body>
</html>
