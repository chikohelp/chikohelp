<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; }
        .theme-btn { 
            background: #fff; color: #000; padding: 15px; margin: 10px 0; 
            border-radius: 10px; cursor: pointer; font-weight: bold; 
        }
        #details { display: none; background: #222; padding: 20px; border-radius: 10px; }
        .back-btn { background: #ff0; color: #000; padding: 10px; margin-top: 10px; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>

    <!-- Главный экран -->
    <div id="main-screen">
        <h1>Помощь</h1>
        <div class="theme-btn" onclick="showDetails('007: Замена ПУ', 'Тут подробная инструкция как делать замену ПУ...')">007: Замена ПУ</div>
        <div class="theme-btn" onclick="showDetails('008: Настройка связи', 'Инструкция по настройке связи...')">008: Настройка связи</div>
    </div>

    <!-- Экран деталей -->
    <div id="details">
        <h2 id="detail-title"></h2>
        <p id="detail-text"></p>
        <div class="back-btn" onclick="hideDetails()">Назад</div>
    </div>

    <script>
        function showDetails(title, text) {
            document.getElementById('main-screen').style.display = 'none';
            document.getElementById('details').style.display = 'block';
            document.getElementById('detail-title').innerText = title;
            document.getElementById('detail-text').innerText = text;
        }
        function hideDetails() {
            document.getElementById('main-screen').style.display = 'block';
            document.getElementById('details').style.display = 'none';
        }
    </script>
</body>
</html>
