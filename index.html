<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; }
        .theme-btn { background: #fff; color: #000; padding: 15px; margin: 10px 0; border-radius: 10px; cursor: pointer; font-weight: bold; }
        #details { display: none; background: #222; padding: 20px; border-radius: 10px; }
        .back-btn { background: #ff0; color: #000; padding: 10px; margin-top: 10px; cursor: pointer; border-radius: 5px; }
        #admin-panel { margin-top: 50px; border-top: 1px solid #333; padding-top: 20px; color: #666; }
    </style>
</head>
<body>

    <div id="main-screen">
        <h1>Помощь</h1>
        <div id="list">
            <div class="theme-btn" onclick="showDetails('007: Замена ПУ', 'Тут подробная инструкция...')">007: Замена ПУ</div>
        </div>
    </div>

    <div id="details">
        <h2 id="detail-title"></h2>
        <p id="detail-text"></p>
        <div class="back-btn" onclick="hideDetails()">Назад</div>
    </div>

    <!-- Админ-панель -->
    <div id="admin-panel">
        <input type="password" id="pass" placeholder="Пароль">
        <button onclick="checkAdmin()">Войти</button>
    </div>

    <script>
        function showDetails(title, text) {
            document.getElementById('main-screen').style.display = 'none';
            document.getElementById('details').style.display = 'block';
            document.getElementById('detail-title').innerText = title;
            document.getElementById('detail-text').innerText = text;
        }
        function hideDetails() {
            document.getElementById('main-screen').style.display = 'block';
            document.getElementById('details').style.display = 'none';
        }
        function checkAdmin() {
            let p = document.getElementById('pass').value;
            if(p === "твой_пароль") { // Замени на свой пароль
                alert("Админ-режим включен! Теперь ты можешь менять контент.");
            }
        }
    </script>
</body>
</html>
