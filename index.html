<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #4b0082; color: #fff; font-family: sans-serif; padding: 20px; }
        .theme-btn { background: #fff; color: #000; padding: 15px; margin: 10px 0; border-radius: 10px; cursor: pointer; font-weight: bold; display: flex; justify-content: space-between; }
        #details { display: none; background: #2a004d; padding: 20px; border-radius: 10px; }
        .admin-controls { display: none; margin-top: 20px; border: 1px solid #fff; padding: 10px; }
        input, button { padding: 8px; margin: 5px; }
    </style>
</head>
<body>

    <div id="main-screen">
        <h1>chikohelp</h1>
        <div id="list">
            <div class="theme-btn" onclick="alert('Тут подробная информация...')">007: Замена ПУ</div>
        </div>

        <!-- Панель управления (появляется после ввода пароля) -->
        <div id="admin-panel">
            <input type="password" id="pass" placeholder="Пароль">
            <button onclick="check()">Войти</button>
        </div>

        <div id="editor" class="admin-controls">
            <h3>Управление темами</h3>
            <input type="text" id="newTitle" placeholder="Заголовок">
            <button onclick="addTheme()">Добавить</button>
            <button onclick="deleteLast()">Удалить последнюю</button>
        </div>
    </div>

    <script>
        function check() {
            if(document.getElementById('pass').value === "Mironnmm#") {
                document.getElementById('editor').style.display = 'block';
                document.getElementById('admin-panel').style.display = 'none';
                alert("Режим администратора активен!");
            } else { alert("Неверный пароль"); }
        }

        function addTheme() {
            let title = document.getElementById('newTitle').value;
            if(!title) return;
            let div = document.createElement('div');
            div.className = 'theme-btn';
            div.innerHTML = title + ' <span>&gt;</span>';
            document.getElementById('list').appendChild(div);
            document.getElementById('newTitle').value = '';
        }

        function deleteLast() {
            let list = document.getElementById('list');
            if(list.lastElementChild) list.removeChild(list.lastElementChild);
        }
    </script>
</body>
</html>
