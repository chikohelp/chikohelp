<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>chikohelp</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #1a0033; color: #fff; font-family: sans-serif; padding: 15px; margin: 0; min-height: 100vh; position: relative; box-sizing: border-box; padding-bottom: 70px; }
        
        /* Вкладки */
        .tabs { display: flex; justify-content: space-between; width: 90%; margin: 20px auto; gap: 10px; }
        .tab-btn { flex: 1; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(191, 0, 255, 0.3); color: #888; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: bold; text-align: center; }
        .tab-btn.active { background: rgba(191, 0, 255, 0.3); border-color: #bf00ff; color: #fff; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* Кнопки */
        .theme-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid #bf00ff; color: #fff; padding: 20px; margin: 15px auto; border-radius: 15px; cursor: pointer; width: 90%; display: block; font-weight: bold; }
        
        /* Окно деталки */
        #details { display: none; background: #2a004d; padding: 20px; border-radius: 20px; border: 1px solid #bf00ff; }
        .btn-back { padding: 15px; background: #bf00ff; color: white; border: none; border-radius: 10px; width: 100%; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="main-screen">
        <input type="text" id="search-input" placeholder="Поиск по темам..." oninput="searchThemes()" style="width: 90%; display: block; margin: 20px auto; padding: 12px; background: #110022; color: #fff; border: 1px solid #bf00ff; border-radius: 10px;">

        <div class="tabs">
            <div class="tab-btn active" id="tab-base" onclick="switchTab('base')">База</div>
            <div class="tab-btn" id="tab-bot" onclick="switchTab('bot')">Чат-бот</div>
        </div>

        <div id="list-base" class="tab-content active">
            <div class="theme-btn" onclick="showDetails('007: Замена прибор учета ээ', 'Замена происходит в том случае если у вас сломался прибор по электроэнергии')">⚡ 007: Замена прибор учета ээ</div>
            <div class="theme-btn" onclick="showDetails('008: коммерческие услуги', 'Текст описания коммерческих услуг...')">⚡ 008: коммерческие услуги</div>
            <div class="theme-btn" onclick="showDetails('009: Сроки оплаты', 'Квитанцию нужно оплачивать до 15 числа включительно')">⚡ 009: Сроки оплаты</div>
        </div>

        <div id="list-bot" class="tab-content">
            <div class="theme-btn" onclick="showDetails('919.03.01: Поверка ПУ воды', '1: Уточните, пожалуйста: поверка была проведена по водоснабжению, верно?\nИ также уточните, пожалуйста, поверка была только по холодной воде или по горячей тоже?\n\n2: Вы можете отправить обращение через сайт ЕИРЦ СПб.ру о том, что у Вас была проведена поверка.\n\n3: Для этого перейдите в раздел «Отправить обращение» → «Вопросы по другим услугам ЖКУ» → «Индивидуальные приборы учёта» → подтема «Принять к расчёту приборы учёта холодной/горячей воды и теплоэнергии».')">⚡ 919.03.01: Поверка ПУ воды</div>
        </div>
    </div>

    <div id="details">
        <h2 id="detail-title" style="color:#0ff; text-align: center;"></h2>
        <p id="detail-text" style="white-space: pre-wrap; line-height: 1.5;"></p>
        <button class="btn-back" onclick="hideDetails()">Назад к списку</button>
    </div>

    <script>
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById('tab-'+tab).classList.add('active');
            document.getElementById('list-'+tab).classList.add('active');
        }
        function showDetails(t, tx) {
            document.getElementById('main-screen').style.display = 'none';
            document.getElementById('details').style.display = 'block';
            document.getElementById('detail-title').innerText = t;
            document.getElementById('detail-text').innerText = tx;
        }
        function hideDetails() {
            document.getElementById('main-screen').style.display = 'block';
            document.getElementById('details').style.display = 'none';
        }
        function searchThemes() {
            let val = document.getElementById('search-input').value.toLowerCase();
            document.querySelectorAll('.tab-content.active .theme-btn').forEach(b => {
                b.style.display = b.innerText.toLowerCase().includes(val) ? 'block' : 'none';
            });
        }
    </script>
</body>
</html>
