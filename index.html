<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>chikohelp</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #1a0033; color: #fff; font-family: sans-serif; padding: 15px; overflow-x: hidden; }
        h1 { text-align: center; color: #bf00ff; text-shadow: 0 0 20px #bf00ff; margin-top: 10px; margin-bottom: 25px; font-size: 28px; }
        
        /* Эффект проводов */
        .wires { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; opacity: 0.1; }
        .wire { position: absolute; background: cyan; width: 2px; height: 100px; animation: move 3s linear infinite; }
        @keyframes move { from { top: -100px; } to { top: 100%; } }

        /* Крупные и проработанные кнопки тем */
        .theme-btn { 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(191, 0, 255, 0.5); 
            color: #fff; 
            padding: 20px; 
            margin: 15px 0; 
            border-radius: 15px; 
            cursor: pointer; 
            transition: 0.3s; 
            font-size: 16px;
            font-weight: bold;
            box-shadow: inset 0 0 10px rgba(191, 0, 255, 0.1);
            display: block;
            width: 90%;
            margin-left: auto;
            margin-right: auto;
        }
        .theme-btn:hover { border-color: #bf00ff; background: rgba(191, 0, 255, 0.2); transform: scale(1.02); box-shadow: 0 0 15px rgba(191, 0, 255, 0.4); }
        
        /* Окно с текстом статьи */
        #details { display: none; background: #2a004d; padding: 25px; border-radius: 20px; border: 2px solid #bf00ff; box-shadow: 0 0 30px #bf00ff; margin-top: 20px; }
        
        /* Скрытая панель администратора */
        .admin-panel { margin-top: 50px; border-top: 1px dashed rgba(191, 0, 255, 0.3); padding-top: 20px; }
        .admin-toggle-btn { background: none; border: none; color: #442266; cursor: pointer; font-size: 11px; display: block; margin: 0 auto; transition: 0.3s; }
        .admin-toggle-btn:hover { color: #bf00ff; }
        #admin-content { display: none; margin-top: 15px; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 10px; border: 1px solid #bf00ff; }
        
        input, textarea { width: 95%; padding: 10px; margin: 8px 0; border-radius: 5px; background: #110022; color: #fff; border: 1px solid #bf00ff; font-size: 14px; }
        .btn-main { padding: 12px 25px; background: #bf00ff; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        .btn-main:hover { background: #d400ff; }
    </style>
</head>
<body>

    <div class="wires">
        <div class="wire" style="left: 10%;"></div>
        <div class="wire" style="left: 50%; animation-delay: 1s;"></div>
        <div class="wire" style="left: 90%; animation-delay: 2s;"></div>
    </div>

    <div id="main-screen">
        <h1>chikohelp</h1>

        <div id="list">
            <div class="theme-btn" onclick="showDetails('007: Замена прибор учета ээ', 'Замена происходит в том случае если у вас сломался прибор по электроэнергии ')">⚡ 007: Замена прибор учета ээ</div>
            <div class="theme-btn" onclick="showDetails('008: коммерческие услуги', 'Текст описания коммерческих услуг или как создать заявку...')">⚡ 008: коммерческие услуги</div>
        </div>
        <div class="admin-panel">
            <button class="admin-toggle-btn" onclick="toggleAdminPanel()">Панель управления</button>
            
            <div id="admin-content">
                <input type="password" id="pass" placeholder="Введите пароль">
                <button class="btn-main" onclick="check()">Войти</button>
                
                <div id="editor" style="display:none; margin-top:15px;">
                    <input type="text" id="t" placeholder="Заголовок темы (например: 009: Название)">
                    <textarea id="tx" rows="4" placeholder="Текст инструкции..."></textarea>
                    <button class="btn-main" onclick="generate()">Сгенерировать код кнопки</button>
                    
                    <p style="font-size: 12px; color: #0ff; margin-top: 10px;">Скопируй строку ниже и вставь на GitHub внутрь списка &lt;div id="list"&gt;:</p>
                    <textarea id="result" style="height:50px; background:#000;" readonly onclick="this.select()"></textarea>
                </div>
            </div>
        </div>
        
        <div class="footer" style="text-align:center; color:#444; font-size:12px; margin-top:30px;">Создатель: Мирбек.Б</div>
    </div>

    <div id="details">
        <h2 id="detail-title" style="color:#0ff; text-align: center;"></h2>
        <p id="detail-text" style="line-height: 1.6; white-space: pre-wrap; font-size: 15px; margin-bottom: 25px;"></p>
        <button class="btn-main" onclick="hideDetails()">Назад к списку</button>
    </div>

    <script>
        function toggleAdminPanel() {
            let panel = document.getElementById('admin-content');
            panel.style.display = (panel.style.display === 'block') ? 'none' : 'block';
        }

        function check() { 
            if(document.getElementById('pass').value === "Mironnmm7#") {
                document.getElementById('editor').style.display = 'block'; 
            } else { 
                alert("Неверный пароль"); 
            } 
        }
        
        function generate() {
            let t = document.getElementById('t').value.trim();
            let tx = document.getElementById('tx').value.trim();
            if(!t || !tx) { alert("Заполни поля!"); return; }
            let safeT = t.replace(/'/g, "\\'").replace(/"/g, "&quot;");
            let safeTx = tx.replace(/'/g, "\\'").replace(/"/g, "&quot;");
            let code = `<div class="theme-btn" onclick="showDetails('${safeT}', '${safeTx}')">⚡ ${safeT}</div>`;
            let resultArea = document.getElementById('result');
            resultArea.value = code;
            resultArea.select();
            document.getElementById('t').value = "";
            document.getElementById('tx').value = "";
        }
        
        function showDetails(t, tx) { 
            document.getElementById('main-screen').style.display = 'none'; 
            document.getElementById('details').style.display = 'block'; 
            document.getElementById('detail-title').innerText = t; 
            document.getElementById('detail-text').innerText = tx; 
            window.scrollTo(0,0);
        }
        
        function hideDetails() { 
            document.getElementById('main-screen').style.display = 'block'; 
            document.getElementById('details').style.display = 'none'; 
        }
    </script>
</body>
</html>
