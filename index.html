<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #1a0033; color: #fff; font-family: sans-serif; padding: 20px; }
        h1 { text-align: center; color: #bf00ff; text-shadow: 0 0 10px #bf00ff; }
        .icon-box { text-align: center; margin-bottom: 20px; }
        .icon-box img { width: 80px; height: 80px; margin: 10px; border: 2px solid #bf00ff; border-radius: 15px; }
        .theme-btn { background: rgba(255, 255, 255, 0.1); border: 1px solid #bf00ff; color: #fff; padding: 15px; margin: 10px 0; border-radius: 15px; cursor: pointer; transition: 0.3s; }
        .theme-btn:hover { background: #bf00ff; }
        #details { display: none; background: #2a004d; padding: 25px; border-radius: 20px; border: 2px solid #bf00ff; }
        .footer { text-align: center; margin-top: 50px; color: #888; font-size: 0.9em; }
        button { padding: 10px 20px; background: #bf00ff; color: white; border: none; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="main-screen">
        <h1>chikohelp</h1>
        
        <div class="icon-box">
            <img src="https://cdn-icons-png.flaticon.com/512/3652/3652191.png" alt="Счетчик">
            <img src="https://cdn-icons-png.flaticon.com/512/2666/2666415.png" alt="Квитанция">
        </div>

        <div id="list">
            </div>

        <div class="footer">Создатель: Мирбек.Б</div>
    </div>

    <div id="details">
        <h2 id="detail-title" style="color:#0ff;"></h2>
        <p id="detail-text"></p>
        <button onclick="hideDetails()">Назад</button>
    </div>

    <script>
        function showDetails(title, text) {
            document.getElementById('main-screen').style.display = 'none';
            document.getElementById('details').style.display = 'block';
            document.getElementById('detail-title').innerText = title;
            document.getElementById('detail-text').innerText = text;
        }
        function hideDetails() {
            document.getElementById('main-screen').style.display = 'block';
            document.getElementById('details').style.display = 'none';
        }
    </script>
</body>
</html>
