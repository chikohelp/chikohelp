<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>chikohelp</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #1a0033; color: #fff; font-family: sans-serif; padding: 15px; overflow-x: hidden; min-height: 100vh; position: relative; box-sizing: border-box; padding-bottom: 60px; }
        
        /* Верхняя панель заголовков */
        .header-area { display: flex; align-items: center; justify-content: center; position: relative; margin-top: 10px; margin-bottom: 25px; min-height: 40px; }
        .logo-left { position: absolute; left: 5px; color: #bf00ff; text-shadow: 0 0 10px #bf00ff; font-size: 16px; font-weight: bold; }
        .main-title { color: #bf00ff; text-shadow: 0 0 20px #bf00ff; font-size: 32px; font-weight: bold; margin: 0; }

        /* Эффект проводов */
        .wires { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; opacity: 0.1; }
        .wire { position: absolute; background: cyan; width: 2px; height: 100px; animation: move 3s linear infinite; }
        @keyframes move { from { top: -100px; } to { top: 100%; } }

        /* Переключатели разделов (Вкладки) */
        .tabs { display: flex; justify-content: space-between; width: 90%; margin: 0 auto 15px auto; gap: 10px; }
        .tab-btn { flex: 1; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(191, 0, 255, 0.3); color: #888; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 15px; transition: 0.3s; text-align: center; }
        .tab-btn.active { background: rgba(191, 0, 255, 0.2); border-color: #bf00ff; color: #fff; box-shadow: 0 0 10px rgba(191, 0, 255, 0.4); }

        /* Контейнеры списков */
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Крупные и проработанные кнопки тем */
        .theme-btn { 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(191, 0, 255, 0.5); 
            color: #fff; 
            padding: 20px; 
            margin: 15px 0; 
            border-radius: 15px; 
            cursor: pointer; 
            transition: 0.3s; 
            font-size: 16px;
            font-weight: bold;
            box-shadow: inset 0 0 10px rgba(191, 0, 255, 0.1);
            display: block;
            width: 90%;
            margin-left: auto;
            margin-right: auto;
        }
        .theme-btn:hover { border-color: #bf00ff; background: rgba(191, 0, 255, 0.2); transform: scale(1.02); box-shadow: 0 0 15px rgba(191, 0, 255, 0.4); }
        
        /* Окно с текстом статьи */
        #details { display: none; background: #2a004d; padding: 25px; border-radius: 20px; border: 2px solid #bf00ff; box-shadow: 0 0 30px #bf00ff; margin-top: 20px; }
        
        /* Нижняя панель (Фиксированный подвал по углам) */
        .bottom-bar { position: absolute; bottom: 15px; left: 15px; right: 15px; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        .admin-toggle-btn { background: none; border: none; color: #442266; cursor: pointer; font-size: 12px; transition: 0.3s; padding: 5px; }
        .admin-toggle-btn:hover { color: #bf00ff; }
        .footer-credits { color: #444; font-size: 12px; padding: 5px; }

        /* Всплывающее окно админки, чтобы не ломать верстку внизу */
        #admin-content { display: none; margin: 15px auto; width: 90%; background: rgba(20, 0, 40, 0.95); padding: 15px; border-radius: 10px; border: 1px solid #bf00ff; box-shadow: 0 0 20px #000; }
        
        input, textarea { width: 95%; padding: 10px; margin: 8px 0; border-radius: 5px; background: #110022; color: #fff; border: 1px solid #bf00ff; font-size: 14px; }
        .btn-main { padding: 12px 25px; background: #bf00ff; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        .btn-main:hover { background: #d400ff; }
    </style>
</head>
<body>

    <div class="wires">
        <div class="wire" style="left: 10%;"></div>
        <div class="wire" style="left: 50%; animation-delay: 1s;"></div>
        <div class="wire" style="left: 90%; animation-delay: 2s;"></div>
    </div>

    <div id="main-screen">
        <!-- Шапка сайта по твоему наброску -->
        <div class="header-area">
            <span class="logo-left">chikohelp</span>
            <h1 class="main-title">ПЭС</h1>
        </div>

        <!-- Живой поиск -->
        <input type="text" id="search-input" placeholder="Поиск по темам..." oninput="searchThemes()" style="width: 90%; display: block; margin: 0 auto 20px auto; background: #110022; color: #fff; border: 1px solid #bf00ff; padding: 12px; border-radius: 10px; font-size: 16px;">

        <!-- Переключатели разделов (База / Чат-бот) -->
        <div class="tabs">
            <div class="tab-btn active" id="tab-base" onclick="switchTab('base')">База</div>
            <div class="tab-btn" id="tab-bot" onclick="switchTab('bot')">Чат-бот</div>
        </div>

        <!-- Раздел 1: БАЗА (Твои текущие темы) -->
        <div id="list-base" class="tab-content active">
            <div class="theme-btn" onclick="showDetails('007: Замена прибор учета ээ', 'Замена происходит в том случае если у вас сломался прибор по электроэнергии ')">⚡ 007: Замена прибор учета ээ</div>
            <div class="theme-btn" onclick="showDetails('008: коммерческие услуги', 'Текст описания коммерческих услуг или как создать заявку...')">⚡ 008: коммерческие услуги</div>
            <div class="theme-btn" onclick="showDetails('009: Сроки оплаты', 'Квитанцию нужно оплачивать до 15 числа включительно')">⚡ 009: Сроки оплаты</div>
        </div>

        <!-- Раздел 2: ЧАТ-БОТ (Сюда будешь добавлять новые скрипты) -->
        <div id="list-bot" class="tab-content">
            <!-- Сюда в будущем будут вставляться кнопки для чат-бота -->
            <div style="text-align: center; color: #666; margin-top: 30px; font-size: 14px;" id="empty-bot-msg">Раздел чат-бота пока пуст. Добавь сюда скрипты через админку!</div>
        </div>

        <!-- Выезжающая панель администратора -->
        <div id="admin-content">
            <input type="password" id="pass" placeholder="Введите пароль">
            <button class="btn-main" onclick="check()">Войти</button>
            
            <div id="editor" style="display:none; margin-top:15px;">
                <input type="text" id="t" placeholder="Заголовок темы (например: 010: Скрипт)">
                <textarea id="tx" rows="4" placeholder="Текст инструкции или скрипта..."></textarea>
                <button class="btn-main" onclick="generate()">Сгенерировать код кнопки</button>
                
                <p style="font-size: 12px; color: #0ff; margin-top: 10px;">Скопируй строку ниже и вставь на GitHub внутрь нужного списка (list-base или list-bot):</p>
                <textarea id="result" style="height:50px; background:#000;" readonly onclick="this.select()"></textarea>
            </div>
        </div>
        
        <!-- Растащенные по углам элементы в самый низ -->
        <div class="bottom-bar">
            <button class="admin-toggle-btn" onclick="toggleAdminPanel()">Панель управления</button>
            <div class="footer-credits">Создатель: Мирбек.Б</div>
        </div>
    </div>

    <!-- Экран детальной информации статьи -->
    <div id="details">
        <h2 id="detail-title" style="color:#0ff; text-align: center;"></h2>
        <p id="detail-text" style="line-height: 1.6; white-space: pre-wrap; font-size: 15px; margin-bottom: 25px;"></p>
        <button class="btn-main" onclick="hideDetails()">Назад к списку</button>
    </div>

    <script>
        // Переключение вкладок "База" и "Чат-бот"
        function switchTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            document.getElementById('search-input').value = ""; // Сбрасываем поиск при переключении
            
            if(tabName === 'base') {
                document.getElementById('tab-base').classList.add('active');
                document.getElementById('list-base').classList.add('active');
            } else {
                document.getElementById('tab-bot').classList.add('active');
                document.getElementById('list-bot').classList.add('active');
            }
            searchThemes(); // Обновляем видимость кнопок
        }

        function toggleAdminPanel() {
            let panel = document.getElementById('admin-content');
            panel.style.display = (panel.style.display === 'block') ? 'none' : 'block';
            if(panel.style.display === 'block') { window.scrollTo(0, document.body.scrollHeight); }
        }

        function check() { 
            if(document.getElementById('pass').value === "Mironnmm7#") {
                document.getElementById('editor').style.display = 'block'; 
            } else { 
                alert("Неверный пароль"); 
            } 
        }
        
        function generate() {
            let t = document.getElementById('t').value.trim();
            let tx = document.getElementById('tx').value.trim();
            if(!t || !tx) { alert("Заполни поля!"); return; }
            let safeT = t.replace(/'/g, "\\'").replace(/"/g, "&quot;");
            let safeTx = tx.replace(/'/g, "\\'").replace(/"/g, "&quot;");
            let code = `<div class="theme-btn" onclick="showDetails('${safeT}', '${safeTx}')">⚡ ${safeT}</div>`;
            let resultArea = document.getElementById('result');
            resultArea.value = code;
            resultArea.select();
            document.getElementById('t').value = "";
            document.getElementById('tx').value = "";
        }

        function showDetails(t, tx) { 
            document.getElementById('main-screen').style.display = 'none'; 
            document.getElementById('details').style.display = 'block'; 
            document.getElementById('detail-title').innerText = t; 
            document.getElementById('detail-text').innerText = tx; 
            window.scrollTo(0,0);
        }
        
        function hideDetails() { 
            document.getElementById('main-screen').style.display = 'block'; 
            document.getElementById('details').style.display = 'none'; 
        }

        // Умный поиск: ищет только внутри открытой в данный момент вкладки
        function searchThemes() {
            let input = document.getElementById('search-input').value.toLowerCase();
            // Находим активный в данный момент контейнер списка
            let activeList = document.querySelector('.tab-content.active');
            let buttons = activeList.querySelectorAll('.theme-btn');
            
            buttons.forEach(function(btn) {
                let text = btn.innerText.toLowerCase();
                if (text.includes(input)) {
                    btn.style.display = "block";
                } else {
                    btn.style.display = "none";
                }
            });
        }
    </script>
</body>
</html>
